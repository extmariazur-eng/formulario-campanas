<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitud de Campaña de Marketing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f8;
      color: #1e1e2e;
      padding: 32px 16px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    header {
      background: linear-gradient(135deg, #6c47ff, #b06af3);
      color: white;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 28px;
      text-align: center;
    }

    header h1 { font-size: 1.8rem; margin-bottom: 6px; }
    header p { opacity: .85; font-size: .95rem; }

    .card {
      background: white;
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }

    .card h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #6c47ff;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #ece8ff;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: .82rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    label span.req { color: #e94b7b; margin-left: 2px; }

    input, select, textarea {
      border: 1.5px solid #e0e0ea;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .95rem;
      font-family: inherit;
      color: #1e1e2e;
      transition: border .2s;
      background: #fafafa;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #6c47ff;
      background: white;
    }

    textarea { resize: vertical; min-height: 80px; }

    /* ── Journey steps ── */
    #steps-container { display: flex; flex-direction: column; gap: 20px; }

    .step-card {
      border: 1.5px solid #e0e0ea;
      border-radius: 12px;
      overflow: hidden;
    }

    .step-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: #f7f5ff;
      border-bottom: 1.5px solid #e0e0ea;
    }

    .step-header-left { display: flex; align-items: center; gap: 12px; }

    .step-badge {
      background: #6c47ff;
      color: white;
      border-radius: 50%;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .step-type-label {
      font-weight: 600;
      font-size: .95rem;
      color: #1e1e2e;
    }

    .btn-remove {
      background: none;
      border: none;
      color: #bbb;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color .2s, background .2s;
    }
    .btn-remove:hover { color: #e94b7b; background: #fff0f5; }

    .step-body { padding: 20px 18px; }
    .step-body .grid-2 { margin-top: 16px; }

    .type-fields { display: none; }
    .type-fields.active { display: contents; }

    /* type badges */
    .type-tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
      margin-left: 8px;
    }
    .tag-push  { background: #e8f4ff; color: #1677ff; }
    .tag-modal { background: #fff3e8; color: #f76b1c; }
    .tag-email     { background: #e8fff2; color: #19a349; }
    .tag-whatsapp  { background: #f0ffe8; color: #25d366; }

    /* buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 9px;
      border: none;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .1s, box-shadow .2s;
    }
    .btn:active { transform: scale(.97); }

    .btn-add {
      background: #ece8ff;
      color: #6c47ff;
      margin-top: 4px;
    }
    .btn-add:hover { background: #ddd5ff; }

    .btn-submit {
      background: linear-gradient(135deg, #6c47ff, #b06af3);
      color: white;
      width: 100%;
      justify-content: center;
      padding: 14px;
      font-size: 1rem;
      border-radius: 11px;
      margin-top: 8px;
      box-shadow: 0 4px 18px rgba(108,71,255,.35);
    }
    .btn-submit:hover { box-shadow: 0 6px 24px rgba(108,71,255,.5); }

    /* success banner */
    #success-banner {
      display: none;
      background: #e8fff2;
      border: 1.5px solid #19a349;
      color: #0e7a33;
      border-radius: 11px;
      padding: 20px 24px;
      text-align: center;
      font-weight: 600;
      margin-top: 16px;
      font-size: 1rem;
    }

    /* char counter */
    .char-count { font-size: .76rem; color: #aaa; text-align: right; margin-top: 2px; }
    .char-count.warn { color: #e94b7b; }

    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Solicitud de Campaña</h1>
    <p>Completá el formulario con todos los detalles de tu journey y las notificaciones que lo componen.</p>
  </header>

  <form id="campaign-form" novalidate>

    <!-- ── Datos generales ── -->
    <div class="card">
      <h2>Datos generales de la campaña</h2>
      <div class="grid-2">

        <div class="field full">
          <label>Nombre de la campaña <span class="req">*</span></label>
          <input type="text" name="nombre_campaña" placeholder="Ej: Tarjeta de crédito – Activación Q2" required />
        </div>

        <div class="field">
          <label>Site <span class="req">*</span></label>
          <input type="text" name="site" placeholder="Ej: MLA, MLM, MLB…" required />
        </div>

        <div class="field">
          <label>Persona que solicita <span class="req">*</span></label>
          <input type="text" name="persona_solicita" placeholder="Nombre y apellido" required />
        </div>

        <div class="field">
          <label>Fecha de inicio deseada <span class="req">*</span></label>
          <input type="date" name="fecha_inicio" required />
        </div>

        <div class="field">
          <label>Fecha de fin</label>
          <input type="date" name="fecha_fin" />
        </div>

        <div class="field full">
          <label>Objetivo de la campaña <span class="req">*</span></label>
          <textarea name="objetivo" placeholder="¿Qué querés lograr con esta campaña? Ej: recuperar usuarios inactivos, aumentar conversión en primer depósito…" required></textarea>
        </div>

        <div class="field">
          <label>Segmento / Audiencia objetivo <span class="req">*</span></label>
          <input type="text" name="segmento" placeholder="Ej: usuarios sin depósito en 30 días" required />
        </div>

        <div class="field">
          <label>Tamaño estimado de audiencia</label>
          <input type="text" name="audiencia_size" placeholder="Ej: ~15.000 usuarios" />
        </div>

        <div class="field full">
          <label>KPI <span class="req">*</span></label>
          <textarea name="kpi" placeholder="¿Qué métrica define el éxito? Ej: tasa de conversión a depósito, CTR > 5%, retención a 7 días…" required></textarea>
        </div>

        <div class="field full">
          <label>Notas adicionales / contexto</label>
          <textarea name="notas" placeholder="Cualquier detalle extra que nos ayude a entender la campaña…"></textarea>
        </div>

      </div>
    </div>

    <!-- ── Query / Entry control ── -->
    <div class="card">
      <h2>Query y Entry Control</h2>
      <div class="grid-2">

        <div class="field full">
          <label>Query <span class="req">*</span></label>
          <textarea name="query" placeholder="Pegá aquí la query SQL o describí la lógica de segmentación…" style="min-height: 120px;" required></textarea>
        </div>

        <div class="field full">
          <label>Entry Control <span class="req">*</span></label>
          <textarea name="entry_control" placeholder="Definí las condiciones de entrada al journey. Ej: usuario sin depósito en los últimos 30 días, no haber recibido esta campaña antes…" required></textarea>
        </div>

      </div>
    </div>

    <!-- ── Journey / pasos ── -->
    <div class="card">
      <h2>Pasos del Journey</h2>
      <div id="steps-container"></div>
      <button type="button" class="btn btn-add" onclick="addStep()">
        + Agregar paso
      </button>
    </div>

    <button type="submit" class="btn btn-submit">Enviar solicitud</button>
    <div id="success-banner">✅ ¡Solicitud enviada correctamente! Nos ponemos en contacto pronto.</div>

  </form>
</div>

<!-- ── Templates por tipo ── -->
<template id="tpl-push">
  <div class="type-fields active" data-type="push">
    <div class="field">
      <label>App <span class="req">*</span></label>
      <select name="push_app" required>
        <option value="">— seleccionar —</option>
        <option value="MP">MP (MercadoPago)</option>
        <option value="ML">ML (MercadoLibre)</option>
      </select>
    </div>
    <div class="field">
      <label>Título <span class="req">*</span></label>
      <input type="text" name="push_titulo" placeholder="Ej: ¡Tu tarjeta te espera!" maxlength="65" oninput="updateCount(this)" required />
      <div class="char-count"><span class="cur">0</span>/65</div>
    </div>
    <div class="field full">
      <label>Cuerpo del mensaje <span class="req">*</span></label>
      <input type="text" name="push_cuerpo" placeholder="Ej: Activá tu tarjeta y empezá a usarla hoy." maxlength="150" oninput="updateCount(this)" required />
      <div class="char-count"><span class="cur">0</span>/150</div>
    </div>
    <div class="field">
      <label>Nombre del CTA <span class="req">*</span></label>
      <input type="text" name="push_cta_nombre" placeholder="Ej: Activar ahora" maxlength="30" required />
    </div>
    <div class="field">
      <label>Deep link / URL de destino <span class="req">*</span></label>
      <input type="text" name="push_link" placeholder="Ej: app://home/tarjeta" required />
    </div>
  </div>
</template>

<template id="tpl-modal">
  <div class="type-fields active" data-type="modal">
    <div class="field full">
      <label>Título <span class="req">*</span></label>
      <input type="text" name="modal_titulo" placeholder="Ej: ¡Activá tu tarjeta!" maxlength="80" oninput="updateCount(this)" required />
      <div class="char-count"><span class="cur">0</span>/80</div>
    </div>
    <div class="field full">
      <label>Cuerpo del mensaje <span class="req">*</span></label>
      <textarea name="modal_cuerpo" placeholder="Ej: Completá el proceso y empezá a disfrutar tus beneficios." maxlength="300" oninput="updateCount(this)" required></textarea>
      <div class="char-count"><span class="cur">0</span>/300</div>
    </div>
    <div class="field">
      <label>Botón principal <span class="req">*</span></label>
      <input type="text" name="modal_boton_principal" placeholder="Ej: Activar ahora" required />
    </div>
    <div class="field">
      <label>CTA (link del botón principal) <span class="req">*</span></label>
      <input type="text" name="modal_cta_link" placeholder="Ej: app://tarjeta/activar" required />
    </div>
    <div class="field">
      <label>Botón secundario / Cerrar <span class="req">*</span></label>
      <input type="text" name="modal_boton_secundario" placeholder="Ej: Ahora no" required />
    </div>
    <div class="field">
      <label>Imagen / ilustración (URL o descripción) <span class="req">*</span></label>
      <input type="text" name="modal_imagen" placeholder="Ej: ilustracion_tarjeta.png" required />
    </div>
  </div>
</template>

<template id="tpl-email">
  <div class="type-fields active" data-type="email">
    <div class="field full">
      <label>Asunto <span class="req">*</span></label>
      <input type="text" name="email_asunto" placeholder="Ej: Tu tarjeta está lista para activar ✅" maxlength="90" oninput="updateCount(this)" required />
      <div class="char-count"><span class="cur">0</span>/90</div>
    </div>
    <div class="field full">
      <label>Cuerpo <span class="req">*</span></label>
      <textarea name="email_cuerpo" placeholder="Describí los bloques principales del email: encabezado, mensaje principal, oferta, CTA, footer…" style="min-height:110px" required></textarea>
    </div>
    <div class="field full">
      <label>Link al archivo HTML (Drive, Dropbox…) <span class="req">*</span></label>
      <input type="text" name="email_html_link" placeholder="Ej: https://drive.google.com/file/d/…" required />
    </div>
  </div>
</template>

<template id="tpl-whatsapp">
  <div class="type-fields active" data-type="whatsapp">
    <div class="field full">
      <label>Cuerpo del mensaje <span class="req">*</span></label>
      <textarea name="wa_cuerpo" placeholder="Escribí el mensaje principal del WhatsApp…" required></textarea>
    </div>
    <div class="field">
      <label>Botón 1 <span class="req">*</span></label>
      <input type="text" name="wa_boton1" placeholder="Ej: Sí, quiero" required />
    </div>
    <div class="field">
      <label>Botón 2 <span class="req">*</span></label>
      <input type="text" name="wa_boton2" placeholder="Ej: No, gracias" required />
    </div>
    <div class="field full">
      <label>Imagen (link opcional — Drive, Dropbox…)</label>
      <input type="text" name="wa_imagen_link" placeholder="Ej: https://drive.google.com/file/d/…" />
    </div>
    <div class="field full">
      <label>Cuerpo para respuesta positiva <span class="req">*</span></label>
      <textarea name="wa_respuesta_positiva" placeholder="Mensaje que se envía si el usuario responde positivamente…" required></textarea>
    </div>
    <div class="field full">
      <label>Cuerpo para respuesta negativa <span class="req">*</span></label>
      <textarea name="wa_respuesta_negativa" placeholder="Mensaje que se envía si el usuario responde negativamente…" required></textarea>
    </div>
    <div class="field full">
      <label>CTA (link) <span class="req">*</span></label>
      <input type="text" name="wa_cta" placeholder="Ej: https://… o app://…" required />
    </div>
  </div>
</template>

<script>
  let stepCount = 0;

  const TYPE_LABELS = {
    push:      { label: 'Push Notification', tag: 'tag-push' },
    modal:     { label: 'Modal',             tag: 'tag-modal' },
    email:     { label: 'Email',             tag: 'tag-email' },
    whatsapp:  { label: 'WhatsApp',          tag: 'tag-whatsapp' },
  };

  function addStep() {
    stepCount++;
    const idx = stepCount;

    const card = document.createElement('div');
    card.className = 'step-card';
    card.id = `step-${idx}`;

    card.innerHTML = `
      <div class="step-header">
        <div class="step-header-left">
          <div class="step-badge">${idx}</div>
          <span class="step-type-label" id="step-label-${idx}">Nuevo paso</span>
        </div>
        <button type="button" class="btn-remove" onclick="removeStep(${idx})" title="Eliminar paso">✕</button>
      </div>
      <div class="step-body">
        <div class="grid-2">
          <div class="field">
            <label>Tipo de notificación <span class="req">*</span></label>
            <select name="step_${idx}_tipo" onchange="onTypeChange(this, ${idx})" required>
              <option value="">— seleccionar —</option>
              <option value="push">Push Notification</option>
              <option value="modal">Modal</option>
              <option value="email">Email</option>
              <option value="whatsapp">WhatsApp</option>
            </select>
          </div>
          <div class="field">
            <label>Día <span class="req">*</span></label>
            <input type="text" name="step_${idx}_dia" placeholder="Ej: Día 0, Día 3, Día 7…" required />
          </div>
        </div>
        <div class="grid-2" id="type-fields-${idx}"></div>
      </div>
    `;

    document.getElementById('steps-container').appendChild(card);
  }

  function onTypeChange(select, idx) {
    const val = select.value;
    const container = document.getElementById(`type-fields-${idx}`);
    container.innerHTML = '';

    if (val && document.getElementById(`tpl-${val}`)) {
      const tpl = document.getElementById(`tpl-${val}`);
      const clone = tpl.content.cloneNode(true);
      clone.querySelectorAll('[name]').forEach(el => {
        el.name = `step_${idx}_${el.name}`;
      });
      container.appendChild(clone);
    }

    const labelEl = document.getElementById(`step-label-${idx}`);
    if (val && TYPE_LABELS[val]) {
      const { label, tag } = TYPE_LABELS[val];
      labelEl.innerHTML = `Paso ${idx} <span class="type-tag ${tag}">${label}</span>`;
    } else {
      labelEl.textContent = `Paso ${idx}`;
    }
  }

  function removeStep(idx) {
    const el = document.getElementById(`step-${idx}`);
    if (el) el.remove();
  }

  function updateCount(input) {
    const max = input.maxLength;
    const cur = input.value.length;
    const counter = input.parentElement.querySelector('.cur');
    const charDiv = input.parentElement.querySelector('.char-count');
    if (counter) {
      counter.textContent = cur;
      charDiv.classList.toggle('warn', cur > max * 0.9);
    }
  }

  document.getElementById('campaign-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const required = this.querySelectorAll('[required]');
    let valid = true;
    required.forEach(el => {
      el.style.borderColor = '';
      if (!el.value.trim()) {
        el.style.borderColor = '#e94b7b';
        valid = false;
      }
    });

    if (!valid) {
      alert('Por favor completá todos los campos obligatorios (marcados con *).');
      return;
    }

    if (document.querySelectorAll('.step-card').length === 0) {
      alert('Agregá al menos un paso al journey.');
      return;
    }

    const SHEET_URL = 'https://script.google.com/a/macros/mercadolibre.com/s/AKfycbyINI2041lx4U_8jPGIgCBAWr1El0wpAxmNCJs9J5SthTZlYuVg8Gvbes_Dyuo8-Latgg/exec';

    const submitBtn = this.querySelector('.btn-submit');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Enviando…';

    const raw = new FormData(this);
    const obj = { timestamp: new Date().toLocaleString('es-AR') };
    for (const [k, v] of raw.entries()) obj[k] = v;

    fetch(SHEET_URL, {
      method: 'POST',
      body: JSON.stringify(obj),
      mode: 'no-cors'
    })
    .then(() => {
      this.style.display = 'none';
      const banner = document.getElementById('success-banner');
      banner.style.display = 'block';
      banner.scrollIntoView({ behavior: 'smooth' });
    })
    .catch(() => {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Enviar solicitud';
      alert('Hubo un error al enviar. Por favor intentá de nuevo.');
    });
  });

  addStep();
</script>
</body>
</html>
